<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {

    display: flex;

  .phone-shell {

<script>
const SYSTEM_PROMPT = `Eres el asistente virtual oficial de Peluquería de Mascotas Rebeca Cuevas. Atiendes por WhatsApp en nombre de Rebeca y te encargas de gestionar citas y anulaciones de forma amable, clara y organizada. Nunca te presentes como una IA; simplemente di que eres el asistente de Rebeca.

HORARIO DE ATENCIÓN:
- Días laborables: lunes a viernes
- Horario: 10:00 a 20:30
- Duración de cada cita: 1 hora y media (90 minutos)
- Franjas disponibles cada día: 10:00 · 11:30 · 13:00 · 14:30 · 16:00 · 17:30 · 19:00
- Sábados, domingos y festivos: cerrado

FLUJO 1 · AGENDAR UNA CITA

Cuando un cliente quiera pedir cita, sigue estos pasos en orden:

PASO 1 — Saludo y especie
Responde siempre con:
"¡Hola! 🐾 Bienvenido/a a la Peluquería de Mascotas Rebeca Cuevas. Soy el asistente de Rebeca, ¿para qué miembro de tu familia necesitas cita?
1️⃣ Perro
2️⃣ Gato
3️⃣ Otro"

Espera a que el cliente elija. Si elige "Otro", indícale amablemente que de momento solo atendemos perros y gatos, y pregunta si desea que Rebeca le contacte directamente.

PASO 2 — Datos del cliente y la mascota
Una vez conocida la especie, solicita: nombre del dueño/a, nombre de la mascota, raza y tamaño aproximado (pequeño, mediano, grande).

PASO 3 — Servicio solicitado
Pregunta qué servicio necesita. Los servicios disponibles dependen de la especie de la mascota:

SERVICIOS PARA PERROS:
1. Baño e higiénico (incluye corte de uñas, limpieza de oídos y expresión de glándulas)
2. Baño y arreglos (incluye corte de uñas, limpieza de oídos y expresión de glándulas)
3. Baño y corte (incluye corte de uñas, limpieza de oídos y expresión de glándulas)
4. Stripping (incluye corte de uñas, limpieza de oídos y expresión de glándulas)
5. Spa canino (incluye corte de uñas, limpieza de oídos y expresión de glándulas)
6. Ozonoterapia (incluye corte de uñas, limpieza de oídos y expresión de glándulas)

SERVICIOS PARA GATOS:
1. Baño e higiénico (incluye corte de uñas, limpieza de oídos y expresión de glándulas)
2. Baño y corte (incluye corte de uñas, limpieza de oídos y expresión de glándulas)
3. Corte (incluye corte de uñas, limpieza de oídos y expresión de glándulas)
4. Deslanado (incluye corte de uñas, limpieza de oídos y expresión de glándulas)
5. Baño y deslanado (incluye corte de uñas, limpieza de oídos y expresión de glándulas)

IMPORTANTE: Todos los servicios incluyen siempre corte de uñas, limpieza de oídos y expresión de glándulas anales. No existen como servicios separados. Si el cliente pregunta por uñas, oídos o glándulas por separado, explícale que ya van incluidos en cualquiera de los servicios. Muestra siempre solo los servicios correspondientes a la especie de la mascota del cliente.

PASO 4 — Elección del día
Muestra los días disponibles de la semana actual (lunes a viernes). Si el cliente prefiere otra semana, muestra esa.

PASO 5 — Elección de la hora
Una vez confirmado el día, muestra las franjas horarias disponibles para ese día.

PASO 6 — Resumen y confirmación
Antes de confirmar, muestra un resumen y pide confirmación.

PASO 7 — Confirmación final
Si el cliente confirma, envía mensaje de confirmación con todos los datos y recuerda la política de 24h para cancelaciones.

FLUJO 2 · ANULAR O CAMBIAR UNA CITA

Cuando un cliente quiera anular o modificar su cita:
- Responde con empatía
- Solicita nombre del dueño/a, mascota, día y hora de la cita
- Verifica si hay más de 24h de antelación
- Si menos de 24h, informa de la política pero procede si el cliente lo pide
- Confirma la anulación y ofrece reagendar
- Si la situación es urgente o el cliente está molesto, escala a Rebeca

REGLAS GENERALES:
- Nunca ofrezcas franjas fuera del horario establecido
- Nunca inventes disponibilidad. Si no tienes acceso a la agenda en tiempo real, indica: "Voy a consultar con Rebeca y te confirmo en breve."
- No atiendas citas para sábados, domingos ni festivos
- Si el cliente escribe en otro idioma, responde en ese mismo idioma
- Mantén siempre un tono cálido, cercano y profesional
- Usa emojis con moderación
- Nunca compartas datos personales de otros clientes
- Para precios: "Para información de precios, Rebeca te atiende directamente. ¿Quieres que le avise?"

La fecha actual es: ${getTodayInfo()}`;

function getTodayInfo() {
  const now = new Date();
  const days = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${days[now.getDay()]}, ${now.getDate()} de ${months[now.getMonth()]} de ${now.getFullYear()}`;
}

function getTime() {
  return new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
}

const APPS_SCRIPT_URL = '/api/calendar';

let conversationHistory = [];
let isLoading = false;

// ── Google Calendar helpers ──────────────────────────────────────────

function extraerLinea(lineas, claves) {
  for (var i = 0; i < lineas.length; i++) {
    for (var j = 0; j < claves.length; j++) {
      if (lineas[i].indexOf(claves[j]) !== -1) {
        var partes = lineas[i].split(':');
        partes.shift();
        return partes.join(':').replace(/[()]/g, '').trim();
      }
    }
  }
  return null;
}

function detectarCitaConfirmada(texto) {
  if (texto.indexOf('confirmada') === -1) return null;
  if (texto.indexOf('📅') === -1 || texto.indexOf('⏰') === -1) return null;
  var lineas = texto.split('\n');
  var mascota  = extraerLinea(lineas, ['Mascota', '🐶', '🐱']);
  var servicio = extraerLinea(lineas, ['Servicio', 'servicio', '✂️']);
  var diaRaw   = extraerLinea(lineas, ['Día', 'día', '📅']);
  var horaRaw  = extraerLinea(lineas, ['Hora', 'hora', '⏰']);
  if (!mascota || !diaRaw || !horaRaw || !servicio) return null;
  return { mascota: mascota, servicio: servicio, diaRaw: diaRaw, horaRaw: horaRaw };
}

function parsearFechaHora(diaRaw, horaRaw) {
  try {
    var meses = { enero:0,febrero:1,marzo:2,abril:3,mayo:4,junio:5,
                  julio:6,agosto:7,septiembre:8,octubre:9,noviembre:10,diciembre:11 };
    var partesDia = diaRaw.replace(/,/g,'').split(' ');
    var dia = 0, mes = -1, anio = new Date().getFullYear();
    for (var i = 0; i < partesDia.length; i++) {
      var p = partesDia[i].toLowerCase();
      if (!isNaN(p) && parseInt(p) <= 31) dia = parseInt(p);
      else if (meses[p] !== undefined) mes = meses[p];
      else if (!isNaN(p) && parseInt(p) > 31) anio = parseInt(p);
    }
    if (!dia || mes === -1) return null;
    var partesHora = horaRaw.replace(/[^0-9:]/g,'').split(':');
    if (partesHora.length < 2) return null;
    var inicio = new Date(anio, mes, dia, parseInt(partesHora[0]), parseInt(partesHora[1]));
    var fin = new Date(inicio.getTime() + 90 * 60000);
    return { inicio: inicio.toISOString(), fin: fin.toISOString() };
  } catch(e) { return null; }
}

function detectarCitaCancelada(texto) {
  return (texto.indexOf('cancelada') !== -1 || texto.indexOf('cancelado') !== -1)
      && texto.indexOf('✅') !== -1;
}

function buscarEventIdEnHistorial() {
  for (var i = conversationHistory.length - 1; i >= 0; i--) {
    if (conversationHistory[i].eventId) return conversationHistory[i].eventId;
  }
  return null;
}

async function guardarEnCalendar(citaData, textoCompleto) {
  try {
    var fechas = parsearFechaHora(citaData.diaRaw, citaData.horaRaw);
    if (!fechas) { console.warn('No se pudo parsear la fecha:', citaData.diaRaw, citaData.horaRaw); return; }
    var duenioMsg = null;
    for (var i = 0; i < conversationHistory.length; i++) {
      var m = conversationHistory[i];
      if (m.role === 'user' && m.content.length > 2 && m.content.length < 50) { duenioMsg = m; break; }
    }
    var payload = {
      action: 'crear',
      mascota:  citaData.mascota,
      servicio: citaData.servicio,
      especie:  textoCompleto.indexOf('🐱') !== -1 ? 'Gato' : 'Perro',
      raza:     '',
      tamanio:  '',
      duenio:   duenioMsg ? duenioMsg.content : 'No indicado',
      inicio:   fechas.inicio,
      fin:      fechas.fin
    };
    console.log('Enviando a Calendar:', payload);
    var res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    var result = await res.json();
    console.log('Respuesta Calendar:', result);
    if (result.eventId) {
      conversationHistory.push({ role: 'system', content: '[INTERNAL]', eventId: result.eventId });
      console.log('✅ Cita guardada en Google Calendar:', result.eventId);
    }
  } catch(err) {
    console.warn('Error guardando en Calendar:', err.message);
  }
}

async function cancelarEnCalendar() {
  try {
    var eventId = buscarEventIdEnHistorial();
    if (!eventId) return;
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'cancelar', eventId: eventId })
    });
    console.log('✅ Cita cancelada en Google Calendar');
  } catch(err) {
    console.warn('Error cancelando en Calendar:', err.message);
  }
}

const messagesArea = document.getElementById('messagesArea');
const typingIndicator = document.getElementById('typingIndicator');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const statusText = document.getElementById('statusText');

function appendMessage(text, role) {
  const wrap = document.createElement('div');
  wrap.className = `bubble-wrap ${role}`;

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  bubble.textContent = text;

  const time = document.createElement('div');
  time.className = 'bubble-time';
  time.textContent = getTime();

  if (role === 'user') time.textContent += ' ✓✓';

  wrap.appendChild(bubble);
  wrap.appendChild(time);

  // Insert before typing indicator
  messagesArea.insertBefore(wrap, typingIndicator);
  scrollToBottom();
}

function scrollToBottom() {
  messagesArea.scrollTop = messagesArea.scrollHeight;
}

function showTyping(show) {
  typingIndicator.className = show ? 'typing-bubble visible' : 'typing-bubble';
  if (show) scrollToBottom();
}

function setStatus(text) {
  statusText.textContent = text;
}

async function sendMessage() {
  const text = userInput.value.trim();
  if (!text || isLoading) return;

  userInput.value = '';
  userInput.style.height = 'auto';
  isLoading = true;
  sendBtn.disabled = true;

  appendMessage(text, 'user');
  conversationHistory.push({ role: 'user', content: text });

  showTyping(true);
  setStatus('escribiendo...');

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: conversationHistory })
    });

    const data = await response.json();
    const reply = data.content?.[0]?.text || 'Lo siento, no pude procesar tu mensaje. Inténtalo de nuevo.';

    conversationHistory.push({ role: 'assistant', content: reply });

    // Detectar y guardar/cancelar cita en Google Calendar
    const citaData = detectarCitaConfirmada(reply);
    if (citaData) {
      guardarEnCalendar(citaData, reply);
    } else if (detectarCitaCancelada(reply)) {
      cancelarEnCalendar();
    }

    // Simulate typing delay based on length
    const delay = Math.min(500 + reply.length * 8, 2000);
    setTimeout(() => {
      showTyping(false);
      appendMessage(reply, 'bot');
      setStatus('en línea');
      isLoading = false;
      sendBtn.disabled = false;
    }, delay);

  } catch (err) {
    showTyping(false);
    appendMessage('Ha ocurrido un error de conexión. Por favor, inténtalo de nuevo.', 'bot');
    setStatus('en línea');
    isLoading = false;
    sendBtn.disabled = false;
  }
}

function resetChat() {
  conversationHistory = [];
  // Remove all messages except date-sep and typing indicator
  const children = [...messagesArea.children];
  children.forEach(child => {
    if (!child.classList.contains('date-sep') && !child.id) {
      messagesArea.removeChild(child);
    }
  });
}

// Auto-resize textarea
userInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

userInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Auto-trigger greeting on load
window.addEventListener('load', () => {
  setTimeout(async () => {
    showTyping(true);
    setStatus('escribiendo...');
    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: [{ role: 'user', content: 'Inicia la conversación con el saludo oficial y pregunta para qué miembro de la familia necesitan cita (perro, gato u otro)' }] })
      });
      const data = await response.json();
      const reply = data.content?.[0]?.text || '¡Hola! 🐾 Bienvenido/a a la Peluquería de Mascotas Rebeca Cuevas. Soy el asistente de Rebeca, ¿en qué puedo ayudarte hoy?';
      conversationHistory.push({ role: 'user', content: 'Inicia la conversación con el saludo oficial y pregunta para qué miembro de la familia necesitan cita (perro, gato u otro)' });
      conversationHistory.push({ role: 'assistant', content: reply });
      setTimeout(() => {
        showTyping(false);
        appendMessage(reply, 'bot');
        setStatus('en línea');
      }, 800);
    } catch {
      showTyping(false);
      const fallback = '¡Hola! 🐾 Bienvenido/a a la Peluquería de Mascotas Rebeca Cuevas. Soy el asistente de Rebeca, ¿para qué miembro de tu familia necesitas cita?\n1️⃣ Perro\n2️⃣ Gato\n3️⃣ Otro';
      conversationHistory.push({ role: 'assistant', content: fallback });
      appendMessage(fallback, 'bot');
      setStatus('en línea');
    }
  }, 600);
});
</script>
